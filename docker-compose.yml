version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: 3waymatch-db
    environment:
      POSTGRES_DB: threeway
      POSTGRES_USER: threeway
      POSTGRES_PASSWORD: threeway123
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
